    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;

    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];

    }

    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.

      ';</' + 'script>';

    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than

    // DOMParser/replaceWith are inert per spec â re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).

e=\"display:flex;align-items:center;justify-content:space-between;gap:12px;\"><div style=\"font:900 21px/1.1 \\'Archivo\\',sans-serif;\">'+esc(d.name)+'<\u002Fdiv><div style=\"flex:none;font:700 12px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#9595A0;\">'+d.members+' members<\u002Fdiv><\u002Fdiv><div style=\"font:500 14px/1.45 \\'Plus Jakarta Sans\\',sans-serif;color:#5A5A66;margin-top:8px;\">'+esc(d.tagline)+'<\u002Fdiv><div style=\"display:flex;flex-wrap:wrap;gap:7px;margin:16px 0;\">'+perks+'<\u002Fdiv><div style=\"display:flex;gap:10px;\"><button data-action=\"join:'+id+'\" style=\"flex:1;padding:12px;border:none;border-radius:11px;background:'+jb.bg+';color:'+jb.fg+';font:800 13px/1 \\'Plus Jakarta Sans\\',sans-serif;cursor:pointer;\">'+jb.label+'<\u002Fbutton><button data-go=\"community:'+id+'\" style=\"flex:none;padding:12px 18px;border:1px solid #E6E6EC;border-radius:11px;background:#fff;font:700 13px/1 \\'Plus Jakarta Sans\\',sans-serif;cursor:pointer;\">View<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>';\n  }).join('');\n\n  var ev = [];\n  CAT_ORDER.forEach(function(id){ EVENTS[id].slice(0,2).forEach(function(e){ ev.push(eventCard(id, e)); }); });\n\n  return header()+\n  '<div style=\"background:linear-gradient(120deg,#1B1226 0%,#2A0F2A 55%,#3A0F2E 100%);\"><div style=\"max-width:1240px;margin:0 auto;padding:46px 24px 40px;text-align:center;\"><div style=\"font:800 11px/1 \\'Plus Jakarta Sans\\',sans-serif;letter-spacing:.18em;text-transform:uppercase;color:#FF8FBF;\">SumanTV Communities<\u002Fdiv><div style=\"font:900 40px/1.08 \\'Archivo\\',sans-serif;color:#fff;margin-top:14px;letter-spacing:-.02em;\">Find your people.<\u002Fdiv><div style=\"font:500 16px/1.5 \\'Plus Jakarta Sans\\',sans-serif;color:#C9B7CE;margin-top:12px;max-width:560px;margin-left:auto;margin-right:auto;\">Meetups, webinars, training, mentoring, expert talks, gifts &amp; goodies â built around the content you already love.<\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n  '<div style=\"max-width:1240px;margin:0 auto;padding:30px 24px 60px;\"><div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-bottom:40px;\">'+cards+'<\u002Fdiv>'+\n    '<div style=\"display:flex;align-items:center;gap:11px;margin-bottom:18px;\"><span style=\"font-size:20px;\">&#128197;<\u002Fspan><div style=\"font:900 24px/1 \\'Archivo\\',sans-serif;letter-spacing:-.01em;\">Upcoming across all communities<\u002Fdiv><\u002Fdiv><div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:14px;\">'+ev.join('')+'<\u002Fdiv><\u002Fdiv>'+ footer();\n}\n\n/* ============================================================\n   PAGE: COMMUNITY\n   ============================================================ */\nfunction pageCommunity(id){\n  var c = CATS[id], d = COMM[id];\n  if(!c) return pageCommunities();\n  var jb = joinBtnStyle(id);\n  var events = EVENTS[id].map(function(e){ return eventCard(id, e); }).join('');\n  var feed = FEED[id].map(function(f){ return '<div style=\"display:flex;gap:13px;padding:16px;background:#fff;border:1px solid #ECECF0;border-radius:16px;\"><div style=\"flex:none;width:42px;height:42px;border-radius:50%;background:'+f.color+';display:flex;align-items:center;justify-content:center;font:800 14px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#fff;\">'+f.initials+'<\u002Fdiv><div style=\"flex:1;min-width:0;\"><div style=\"display:flex;align-items:center;gap:8px;\"><span style=\"font:800 13.5px/1 \\'Plus Jakarta Sans\\',sans-serif;\">'+esc(f.name)+'<\u002Fspan><span style=\"font:600 11.5px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#9595A0;\">&middot; '+f.time+'<\u002Fspan><\u002Fdiv><div style=\"font:500 14px/1.5 \\'Plus Jakarta Sans\\',sans-serif;color:#33333D;margin-top:6px;\">'+esc(f.text)+'<\u002Fdiv><\u002Fdiv><\u002Fdiv>'; }).join('');\n  var reels = reelsOf(id).map(function(r){ return reelCard(deco(r)); }).join('');\n  var perks = d.perks.map(function(p){ return '<div style=\"display:flex;gap:11px;align-items:center;padding:9px 0;border-top:1px solid #F2F2F5;\"><span style=\"flex:none;width:30px;height:30px;border-radius:9px;background:'+c.tint+';color:'+c.color+';display:flex;align-items:center;justify-content:center;font-size:14px;\">&#9733;<\u002Fspan><span style=\"font:600 13.5px/1.3 \\'Plus Jakarta Sans\\',sans-serif;color:#33333D;\">'+esc(p)+'<\u002Fspan><\u002Fdiv>'; }).join('');\n\n  return header()+\n  '<div style=\"position:relative;height:230px;background:'+c.color+';overflow:hidden;\"><img src=\"'+thumb(d.cover,1200,400)+'\" alt=\"'+esc(d.name)+'\" style=\"width:100%;height:100%;object-fit:cover;opacity:.5;\" /><div style=\"position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,15,25,.25),rgba(15,15,25,.75));\"><\u002Fdiv><div style=\"position:absolute;inset:0;\"><div style=\"max-width:1240px;margin:0 auto;padding:24px;height:100%;display:flex;flex-direction:column;justify-content:space-between;\"><div data-go=\"communities\" style=\"display:inline-flex;align-items:center;gap:6px;font:700 12.5px/1 \\'Plus Jakarta Sans\\',sans-serif;color:rgba(255,255,255,.85);cursor:pointer;width:fit-content;\">&larr; All communities<\u002Fdiv><div><span style=\"padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);font:800 11px/1 \\'Plus Jakarta Sans\\',sans-serif;letter-spacing:.04em;text-transform:uppercase;color:#fff;\">'+c.en+' community<\u002Fspan><div style=\"font:900 38px/1.05 \\'Archivo\\',sans-serif;color:#fff;margin-top:12px;letter-spacing:-.02em;\">'+esc(d.name)+'<\u002Fdiv><div style=\"font:500 15px/1.4 \\'Noto Sans Telugu\\',sans-serif;color:#E6E6EC;margin-top:8px;\">'+esc(d.te)+'<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>'+\n  '<div style=\"background:#fff;border-bottom:1px solid #ECECF0;\"><div style=\"max-width:1240px;margin:0 auto;padding:18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;\"><div style=\"display:flex;gap:30px;\"><div><div style=\"font:900 22px/1 \\'Archivo\\',sans-serif;\">'+d.members+'<\u002Fdiv><div style=\"font:600 11.5px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#9595A0;margin-top:5px;\">Members<\u002Fdiv><\u002Fdiv><div><div style=\"font:900 22px/1 \\'Archivo\\',sans-serif;\">'+EVENTS[id].length+'<\u002Fdiv><div style=\"font:600 11.5px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#9595A0;margin-top:5px;\">Upcoming events<\u002Fdiv><\u002Fdiv><div><div style=\"font:900 22px/1 \\'Archivo\\',sans-serif;color:'+c.color+';\">Free<\u002Fdiv><div style=\"font:600 11.5px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#9595A0;margin-top:5px;\">Membership<\u002Fdiv><\u002Fdiv><\u002Fdiv><button data-action=\"join:'+id+'\" style=\"padding:13px 26px;border:none;border-radius:12px;background:'+jb.bg+';color:'+jb.fg+';font:800 14px/1 \\'Plus Jakarta Sans\\',sans-serif;cursor:pointer;box-shadow:0 4px 14px rgba(236,19,131,.22);\">'+jb.label+'<\u002Fbutton><\u002Fdiv><\u002Fdiv>'+\n  '<div style=\"max-width:1240px;margin:0 auto;padding:30px 24px 60px;display:grid;grid-template-columns:1fr 340px;gap:34px;\"><div style=\"min-width:0;\"><div style=\"font:900 22px/1 \\'Archivo\\',sans-serif;margin-bottom:6px;\">Upcoming events<\u002Fdiv><div style=\"font:600 13px/1 \\'Plus Jakarta Sans\\',sans-serif;color:#9595A0;margin-bottom:18px;\">Meetups, webinars, training &amp; expert talks<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:13px;margin-bottom:34px;\">'+events+'<\u002Fdiv>'+\n    '<div style=\"font:900 22px/1 \\'Archivo\\',sans-serif;margin-bottom:18px;\">From the community<\u002Fdiv><div style=\"display:flex;flex-direction:column;gap:12px;margin-bottom:34px;\">'+feed+'<\u002Fdiv>'+\n    '<div style=\"font:900 22px/1 \\'Archivo\\',sans-serif;margin-bottom:18px;\">Latest reels from this community<\u002Fdiv><div style=\"display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:20px 16px;\">'+reels+'<\u002Fdiv><\u002Fdiv>'+\n    '<aside style=\"min-width:0;\"><div style=\"position:sticky;top:84px;display:flex;flex-direction:column;gap:20px;\"><div style=\"background:#fff;border:1px solid #ECECF0;border-radius:18px;padding:20px;\"><div style=\"font:900 16px/1 \\'Archivo\\',sans-serif;margin-bottom:14px;\">Member perks<\u002Fdiv>'+perks+'<\u002Fdiv><div style=\"background:linear-gradient(135deg,#FFF1F8,#FBE9F3);border:1px solid #FBD9EA;border-radius:18px;padding:20px;\"><div style=\"font-size:24px;margin-bottom:8px;\">&#127873;<\u002Fdiv><div style=\"font:900 16px/1.2 \\'Archivo\\',sans-serif;\">Goodies for new members<\u002Fdiv><div style=\"font:500 13px/1.45 \\'Plus Jakarta Sans\\',sans-serif;color:#6B6B76;margin-top:8px;\">Join this month &amp; unlock a SumanTV welcome kit + early webinar access.<\u002Fdiv><button data-action=\"join:'+id+'\" style=\"width:100%;margin-top:14px;padding:12px;border:none;border-radius:11px;background:'+ACCENT+';color:#fff;font:800 13px/1 \\'Plus Jakarta Sans\\',sans-serif;cursor:pointer;\">'+jb.label+'<\u002Fbutton><\u002Fdiv>'+\n    (SHOW_ADS?'<div>'+adSlot('Community sponsor','300&times;250 display',250)+'<\u002Fdiv>':'')+'<\u002Fdiv><\u002Faside><\u002Fdiv>'+ footer();\n}\n\n/* ============================================================\n   ROUTER + EVENTS\n   ============================================================ */\nfunction parseHash(){\n  var h = (location.hash || '#/').replace(/^#/,'');\n  var parts = h.split('/').filter(Boolean);   // ['category','health']\n  if(parts.length===0) return {screen:'home'};\n  if(parts[0]==='category')   return {screen:'category', id:parts[1]};\n  if(parts[0]==='reel')       return {screen:'reel', id:parts[1]};\n  if(parts[0]==='communities')return {screen:'communities'};\n  if(parts[0]==='community')  return {screen:'community', id:parts[1]};\n  return {screen:'home'};\n}\n\nfunction render(){\n  var route = parseHash();\n  var html;\n  if(route.screen==='category')        html = pageCategory(route.id);\n  else if(route.screen==='reel')       html = pageReel(route.id);\n  else if(route.screen==='communities')html = pageCommunities();\n  else if(route.screen==='community')  html = pageCommunity(route.id);\n  else                                 html = pageHome();\n  document.getElementById('app').innerHTML = html;\n  window.scrollTo(0,0);\n  // if a real DB is wired, hydrate over the seed content\n  if(window.SumanTVDB && typeof window.SumanTVDB.hydrate==='function'){\n    try { window.SumanTVDB.hydrate(route); } catch(e){ console.warn('DB hydrate failed', e); }\n  }\n}\n\nfunction navigate(target){            // target like 'category:health' or 'home'\n  var p = target.split(':');\n  var map = { home:'#/', communities:'#/communities', category:'#/category/', reel:'#/reel/', community:'#/community/' };\n  var base = map[p[0]] || '#/';\n  location.hash = p[1] ? base + p[1] : base;\n}\n\nvar toastTimer;\nfunction toast(msg){\n  var el = document.getElementById('toast');\n  el.textContent = msg; el.style.display='block';\n  clearTimeout(toastTimer);\n  toastTimer = setTimeout(function(){ el.style.display='none'; }, 2800);\n}\n\nfunction toggleJoin(id){\n  var now = !state.joined[id];\n  if(now) state.joined[id]=true; else delete state.joined[id];\n  localStorage.setItem('sumantv_joined', JSON.stringify(state.joined));\n  toast(now ? ('ð Welcome to '+COMM[id].name+'! Check your goodies.') : ('Left '+COMM[id].name+'.'));\n  render();\n}\n\ndocument.addEventListener('click', function(e){\n  var go = e.target.closest('[data-go]');\n  if(go){ navigate(go.getAttribute('data-go')); return; }\n  var act = e.target.closest('[data-action]');\n  if(act){\n    var a = act.getAttribute('data-action');\n    if(a==='lang'){ state.lang = state.lang==='te'?'en':'te'; localStorage.setItem('sumantv_lang', state.lang); render(); }\n    else if(a==='register'){ toast('ð Registered! We just emailed your joining link.'); }\n    else if(a.indexOf('join:')===0){ toggleJoin(a.split(':')[1]); }\n  }\n});\n\nwindow.addEventListener('hashchange', render);\nrender();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
