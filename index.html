/* ---------- helpers ---------- */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function thumb(seed,w,h){ return 'https://picsum.photos/seed/'+seed+'/'+w+'/'+h; }
function byId(id){ for(var i=0;i<REELS.length;i++){ if(REELS[i].id===id) return REELS[i]; } return REELS[0]; }
function reelsOf(cat){ return REELS.filter(function(r){ return r.cat===cat; }); }
function isJoined(id){ return !!state.joined[id]; }

function deco(r,rank){
  var c = CATS[r.cat];
  var te = state.lang==='te';
  return {
    id:r.id, rank:rank||0,
    primary: te? r.te : r.en,
    secondary: te? r.en : r.te,
    srcShort: r.src==='YouTube'?'YT':'IG',
    srcLabel: r.src==='YouTube'?'YouTube Shorts':'Instagram Reels',
    catName:c.en, catColor:c.color, catTint:c.tint,
    channel:r.channel, views:r.views, dur:r.dur, src:r.src, tags:r.tags,
    thumb: thumb(r.seed,360,450), thumbTall: thumb(r.seed,540,960),
    seed:r.seed
  };
}

  return header()+
  '<div style="position:relative;height:230px;background:'+c.color+';overflow:hidden;"><img src="'+thumb(d.cover,1200,400)+'" alt="'+esc(d.name)+'" style="width:100%;height:100%;object-fit:cover;opacity:.5;" /><div style="position:absolute;inset:0;background:linear-gradient(180deg,rgba(15,15,25,.25),rgba(15,15,25,.75));"></div><div style="position:absolute;inset:0;"><div style="max-width:1240px;margin:0 auto;padding:24px;height:100%;display:flex;flex-direction:column;justify-content:space-between;"><div data-go="communities" style="display:inline-flex;align-items:center;gap:6px;font:700 12.5px/1 \'Plus Jakarta Sans\',sans-serif;color:rgba(255,255,255,.85);cursor:pointer;width:fit-content;">&larr; All communities</div><div><span style="padding:6px 12px;border-radius:999px;background:rgba(255,255,255,.16);backdrop-filter:blur(6px);font:800 11px/1 \'Plus Jakarta Sans\',sans-serif;letter-spacing:.04em;text-transform:uppercase;color:#fff;">'+c.en+' community</span><div style="font:900 38px/1.05 \'Archivo\',sans-serif;color:#fff;margin-top:12px;letter-spacing:-.02em;">'+esc(d.name)+'</div><div style="font:500 15px/1.4 \'Noto Sans Telugu\',sans-serif;color:#E6E6EC;margin-top:8px;">'+esc(d.te)+'</div></div></div></div></div>'+

/* ============================================================
   ROUTER + EVENTS
   ============================================================ */
function parseHash(){
  var h = (location.hash || '#/').replace(/^#/,'');
  var parts = h.split('/').filter(Boolean);   // ['category','health']
  if(parts.length===0) return {screen:'home'};
  if(parts[0]==='category')   return {screen:'category', id:parts[1]};
  if(parts[0]==='reel')       return {screen:'reel', id:parts[1]};
  if(parts[0]==='communities')return {screen:'communities'};
  if(parts[0]==='community')  return {screen:'community', id:parts[1]};
  return {screen:'home'};
}

function render(){
  var route = parseHash();
  var html;
  if(route.screen==='category')        html = pageCategory(route.id);
  else if(route.screen==='reel')       html = pageReel(route.id);
  else if(route.screen==='communities')html = pageCommunities();
  else if(route.screen==='community')  html = pageCommunity(route.id);
  else                                 html = pageHome();
  document.getElementById('app').innerHTML = html;
  window.scrollTo(0,0);
  // if a real DB is wired, hydrate over the seed content
  if(window.SumanTVDB && typeof window.SumanTVDB.hydrate==='function'){
    try { window.SumanTVDB.hydrate(route); } catch(e){ console.warn('DB hydrate failed', e); }
  }
}

function navigate(target){            // target like 'category:health' or 'home'
  var p = target.split(':');
  var map = { home:'#/', communities:'#/communities', category:'#/category/', reel:'#/reel/', community:'#/community/' };
  var base = map[p[0]] || '#/';
  location.hash = p[1] ? base + p[1] : base;
}

var toastTimer;
function toast(msg){
  var el = document.getElementById('toast');
  el.textContent = msg; el.style.display='block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display='none'; }, 2800);
}

function toggleJoin(id){
  var now = !state.joined[id];
  if(now) state.joined[id]=true; else delete state.joined[id];
  localStorage.setItem('sumantv_joined', JSON.stringify(state.joined));
  toast(now ? ('\ud83c\udf89 Welcome to '+COMM[id].name+'! Check your goodies.') : ('Left '+COMM[id].name+'.'));
  render();
}

document.addEventListener('click', function(e){
  var go = e.target.closest('[data-go]');
  if(go){ navigate(go.getAttribute('data-go')); return; }
  var act = e.target.closest('[data-action]');
  if(act){
    var a = act.getAttribute('data-action');
    if(a==='lang'){ state.lang = state.lang==='te'?'en':'te'; localStorage.setItem('sumantv_lang', state.lang); render(); }
    else if(a==='register'){ toast('\ud83c\udf89 Registered! We just emailed your joining link.'); }
    else if(a.indexOf('join:')===0){ toggleJoin(a.split(':')[1]); }
  }
});

window.addEventListener('hashchange', render);
render();
</script>
